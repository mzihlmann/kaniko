name: Build images

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions: {}

jobs:
  build-images:
    concurrency:
      # If a previous run is ongoing with the same head_ref (it's a run on the
      # same PR) then cancel it to save time. If it isn't a PR, only cancel the
      # previous run if it's on the same commit SHA. This prevents a run for a
      # commit push from cancelling a previous commit push's build, since we
      # want an image built and tagged for each commit.
      group: build-images-${{ github.head_ref || github.sha }}
      cancel-in-progress: true

    permissions:
      contents: read  # Read the repo contents.

    runs-on: ubuntu-latest

    env:
      REGISTRY: martizih/kaniko
      TAG: ${{ github.sha }}
      
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Setup auth if not a PR.
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push with Docker.
      - if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
        with:
          platforms: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - uses: docker/bake-action@37816e747588cb137173af99ab33873600c46ea8 # v6.8.0
        with:
          source: .
          push: false
          targets: executor,debug,slim,warmer,bootstrap
          set: |
            *.platform=linux/amd64

  merge-manifests:
    concurrency:
      # If a previous run is ongoing with the same head_ref (it's a run on the
      # same PR) then cancel it to save time. If it isn't a PR, only cancel the
      # previous run if it's on the same commit SHA. This prevents a run for a
      # commit push from cancelling a previous commit push's build, since we
      # want an image built and tagged for each commit.
      group: merge-manifests-${{ matrix.image }}-${{ github.head_ref || github.sha }}
      cancel-in-progress: true

    permissions:
      contents: read  # Read the repo contents.
      id-token: write  # Produce identity token for keyless signing.

    needs: build-images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - executor
          - executor-debug
          - executor-slim
          - warmer
          - bootstrap

        include:
          - image: executor          
            image-name: martizih/kaniko
            release-tag: latest

          - image: executor-debug
            image-name: martizih/kaniko
            release-tag: debug

          - image: executor-slim
            image-name: martizih/kaniko
            release-tag: slim

          - image: warmer
            image-name: martizih/kaniko
            release-tag: warmer

          - image: bootstrap
            image-name: martizih/kaniko
            release-tag: bootstrap
  
    steps:
      - uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      # Sign images if not a PR.
      - if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
      - if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
              martizih/kaniko@${{ steps.build-and-push.outputs.digest }}

      # If a tag push, use crane to add more tags.
      - if: startsWith(github.ref, 'refs/tags/v')
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4
      - if: startsWith(github.ref, 'refs/tags/v')
        name: Apply release tags
        run: |
          tag=${GITHUB_REF/refs\/tags\//}

          # Tag :latest, :debug, :slim
          crane cp martizih/kaniko@${{ steps.build-and-push.outputs.digest }} \
              martizih/kaniko:${{ matrix.release-tag }}

          if [[ "${{ matrix.release-tag }}" == "latest" ]]; then
            # Tag :latest images as :v1.X.Y
            crane cp martizih/kaniko@${{ steps.build-and-push.outputs.digest }} \
                martizih/kaniko:${tag}
          else
            # Or tag :v1.X.Y-debug and :v1.X.Y-slim
            crane cp martizih/kaniko@${{ steps.build-and-push.outputs.digest }} \
                martizih/kaniko:${tag}-${{ matrix.release-tag }}
          fi
